<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Additya's Portfolio - Projects</title>

    <link rel="stylesheet" href="../assets/css/Portfolio.css" />
    <link rel="stylesheet" href="../assets/css/Project.css" />
</head>

<body>

<div class="main">

    <nav>
        <div class="brand">Additya's Portfolio</div>
        <ul>
            <li><a href="../index.html" class="nav-link">Home</a></li>
            <li><a href="./About.html" class="nav-link">About</a></li>
            <li><a href="./Projects.html" class="nav-link active">Projects</a></li>
            <li><a href="./Resume.html" class="nav-link" target="_blank">Digital Resume</a></li>
        </ul>
    </nav>

    <div class="content dashboard">

        <!-- PROJECTS PANEL -->
        <section class="dashboard__projects">
            <div class="dashboard__header">
                <h2>Projects</h2>
                <p>Select a project or skill to explore relationships.</p>
            </div>

            <div id="projectsContainer" class="projects__container"></div>
        </section>

        <!-- SKILLS PANEL -->
        <section class="dashboard__skills">

            <div class="dashboard__header">
                <h2>Skill Matrix</h2>
                <p>Sorted by frequency of usage.</p>

                <input
                    type="text"
                    id="skillSearch"
                    placeholder="Search skills (regex supported)..."
                    class="skill-search"
                />
            </div>

            <div id="skillsContainer" class="skills__container"></div>

            <div class="matrix-footer">
                <button id="clearSelection" class="clear-btn">
                    Clear Selection
                </button>
            </div>

        </section>

    </div>

</div>

<footer>
    <p>© 2025 Additya. All Rights Reserved.</p>
</footer>

<script src="../assets/js/project.js"></script>

</body>
</html>
